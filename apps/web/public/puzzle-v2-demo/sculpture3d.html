<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 B+ · three.js 照片级写实浮雕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --paper:#efece5; --ink:#2b2a27; --muted:#9c978c; --hair:#d9d4ca; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #e7e3da; color: var(--ink); min-height: 100vh; padding: 26px;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: 'Songti SC','Noto Serif SC','Source Han Serif SC',Georgia,serif; }

  .plate {
    max-width: 1200px; margin: 0 auto;
    background: radial-gradient(120% 120% at 50% 0%, #f6f4ee 0%, var(--paper) 60%, #e8e4db 100%);
    border-radius: 14px; padding: 26px 30px 22px;
    box-shadow: 0 36px 90px rgba(40,38,33,.16), inset 0 0 0 1px rgba(255,255,255,.5);
  }
  .top { display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; margin-bottom: 18px; }
  .top .l .kicker { font-size: 10px; letter-spacing: .34em; color: var(--muted); }
  .top .l .h { font-size: 19px; letter-spacing: .06em; margin-top: 5px; }
  .top .l .h small { color: var(--muted); font-size: 13px; letter-spacing: .1em; }
  .top .c { text-align: center; }
  .top .c .bc { font-size: 10px; color: var(--muted); letter-spacing: .12em; }
  .top .c .h { font-size: 24px; letter-spacing: .14em; margin-top: 3px; }
  .top .c .en { font-size: 9px; color: var(--muted); letter-spacing: .42em; margin-top: 4px; }
  .top .r { text-align: right; font-size: 12px; color: #6f6a60; }
  .top .r .wx { margin-top: 6px; letter-spacing: .16em; color: var(--muted); font-size: 11px; }

  .body { display: grid; grid-template-columns: 64px 1fr; gap: 8px; }
  .rail { display: flex; flex-direction: column; justify-content: space-between; padding: 6px 0; }
  .rail .legend .li { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #6f6a60; margin-bottom: 10px; }
  .rail .legend .li::before { content:''; width:12px; height:12px; border-radius:50%; flex:none; box-shadow: inset 0 1px 2px rgba(0,0,0,.35); }
  .rail .legend .done::before { background:#6d6a64; }
  .rail .legend .todo::before { background:#ded9cf; }
  .rail .legend .li span { writing-mode: vertical-rl; letter-spacing:.12em; }
  .compass { width:42px; height:42px; opacity:.5; }

  .stage { position: relative; }
  .map-frame {
    position: relative; width: 100%; aspect-ratio: 3 / 2; border-radius: 8px; overflow: hidden;
    background: #efece5; box-shadow: inset 0 0 0 1px rgba(40,38,33,.08), inset 0 2px 18px rgba(40,38,33,.08);
  }
  #gl { width: 100%; height: 100%; display: block; }
  .overlay { position: absolute; inset: 0; pointer-events: none; }

  .label { position: absolute; transform: translate(-50%, -120%); text-align: center; white-space: nowrap; }
  .label .ic { display:block; margin:0 auto 6px; width:22px; height:22px; }
  .label .nm { display:block; font-size:14px; letter-spacing:.02em; }
  .label .tm { display:block; font-size:10px; letter-spacing:.12em; margin-top:3px; opacity:.85; font-variant-numeric: tabular-nums; }
  .label.dark { color:#f3f0e9; text-shadow: 0 1px 3px rgba(0,0,0,.55); }
  .label.dark .ic * { stroke:#f3f0e9; }
  .label.light { color:#403d36; text-shadow: 0 1px 0 rgba(255,255,255,.7); }
  .label.light .ic * { stroke:#544f47; }

  .loading { position:absolute; inset:0; display:grid; place-items:center; color:var(--muted); font-size:12px; letter-spacing:.2em; }

  .bottom { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-top: 14px; color: var(--muted); }
  .bottom .mid { text-align:center; font-size:11px; letter-spacing:.3em; }
  .bottom .rt { text-align:right; font-size:10px; letter-spacing:.34em; }
  .btn { border:1px solid var(--hair); background:rgba(255,255,255,.5); color:#5a564d; font:inherit; font-size:11px; letter-spacing:.1em; padding:7px 14px; border-radius:20px; cursor:pointer; }
  .btn:hover { background:#fff; }
  .hint { font-size:10px; letter-spacing:.12em; color:var(--muted); margin-left:10px; }
</style>

<body>
  <div class="plate">
    <div class="top">

        <div class="kicker">YEAR REVIEW</div>

      </div>
      <div class="c">
        <div class="bc">年终复盘 › 当日详情</div>

    <div class="body">

          <div class="li done"><span>已完成</span></div>
          <div class="li todo"><span>未完成</span></div>

      <div class="lf"><button class="btn" onclick="window.__regen&&window.__regen()">重新生成</button><span class="hint">拖拽旋转 · 滚轮缩放</span></div>
      <div class="mid serif">专 注 · 系 统 · 成 长</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';

/* ============================ 任务数据 ============================ */
let tasks = [
  { id:'plan',  name:'晨间计划', time:'06:30 – 08:00', duration:90,  done:true,  icon:'sun'    },
  { id:'deep',  name:'深度工作', time:'09:00 – 11:30', duration:150, done:true,  icon:'peak'   },
  { id:'code',  name:'编码',     time:'12:30 – 14:00', duration:90,  done:true,  icon:'code'   },
  { id:'meet',  name:'会议',     time:'14:00 – 15:30', duration:90,  done:false, icon:'people' },
  { id:'sport', name:'运动',     time:'17:30 – 18:30', duration:60,  done:false, icon:'run'    },
  { id:'read',  name:'阅读',     time:'19:30 – 20:30', duration:60,  done:false, icon:'book'   },
  { id:'rev',   name:'复盘',     time:'21:00 – 22:00', duration:60,  done:false, icon:'cycle'  },
  { id:'rest',  name:'休闲',     time:'22:00 – 23:00', duration:60,  done:false, icon:'cup'    },
];
const ICONS = {
  sun:'<circle cx="11" cy="11" r="4.5"/><line x1="11" y1="1" x2="11" y2="4"/><line x1="11" y1="18" x2="11" y2="21"/><line x1="1" y1="11" x2="4" y2="11"/><line x1="18" y1="11" x2="21" y2="11"/><line x1="4" y1="4" x2="6" y2="6"/><line x1="16" y1="16" x2="18" y2="18"/><line x1="4" y1="18" x2="6" y2="16"/><line x1="16" y1="6" x2="18" y2="4"/>',
  peak:'<path d="M2 19 L8 7 L12 13 L15 8 L20 19 Z"/>',
  code:'<polyline points="7,7 2,11 7,15"/><polyline points="15,7 20,11 15,15"/><line x1="12" y1="5" x2="10" y2="17"/>',
  people:'<circle cx="8" cy="8" r="3"/><circle cx="15" cy="9" r="2.5"/><path d="M3 19 C3 14 13 14 13 19"/><path d="M12 19 C12 15 19 15 19 19"/>',
  run:'<circle cx="13" cy="4" r="2"/><path d="M13 7 L10 12 L14 14 L13 20"/><path d="M10 12 L5 13"/><path d="M14 14 L18 12"/>',
  book:'<path d="M11 5 C8 3 3 3 3 3 L3 17 C3 17 8 17 11 19 C14 17 19 17 19 17 L19 3 C19 3 14 3 11 5 Z"/><line x1="11" y1="5" x2="11" y2="19"/>',
  cycle:'<path d="M5 11 A6 6 0 1 1 7 16"/><polyline points="3,7 5,11 9,9"/>',
  cup:'<path d="M4 7 L16 7 L15 16 C15 18 5 18 5 16 Z"/><path d="M16 9 C20 9 20 14 16 14"/>',
};

/* ============================ 高度场引擎（同 2D 版） ============================ */
const FW = 900, FH = 600;          // 场域采样空间
const WARP = 30, WATER_W = 14, RAMP = 44;   // RAMP 越大坡越缓、台地越像低浮雕
let mapSeed = 20241231;

function hash(x,y,s){ let h=s+x*374761393+y*668265263; h=(h^(h>>13))*1274126177; h=h^(h>>16); return (h&0x7fffffff)/0x7fffffff; }
const sm = t => t*t*(3-2*t);
function noise(x,y,s){ const ix=Math.floor(x),iy=Math.floor(y),fx=sm(x-ix),fy=sm(y-iy);
  const a=hash(ix,iy,s),b=hash(ix+1,iy,s),c=hash(ix,iy+1,s),d=hash(ix+1,iy+1,s);
  return a+(b-a)*fx+(c-a)*fy+(a-b-c+d)*fx*fy; }
function fbm(x,y,s,oct=4){ let v=0,amp=1,f=1,m=0; for(let i=0;i<oct;i++){ v+=amp*noise(x*f,y*f,s+i*57); m+=amp; amp*=.5; f*=2; } return v/m; }
function rand(s){ return hash(s&65535,(s>>16)&65535,mapSeed); }

let SEEDS = [];
function buildSeeds(W,H){
  const total=tasks.reduce((a,t)=>a+t.duration,0), cx=W/2, cy=H/2, golden=Math.PI*(3-Math.sqrt(5)), n=tasks.length;
  let seeds=tasks.map((task,i)=>{ const ratio=task.duration/total;
    const ang=i*golden+(rand(i*13+1)-.5)*.6, rad=Math.sqrt((i+.5)/n)*Math.min(W,H)*0.46;
    return { task, x:cx+Math.cos(ang)*rad*(W/Math.min(W,H)), y:cy+Math.sin(ang)*rad, weight:(0.5+ratio)*W*H*0.12 }; });
  for(let pass=0;pass<6;pass++){ const ax=Array(n).fill(0),ay=Array(n).fill(0),cnt=Array(n).fill(0),step=6;
    for(let y=0;y<H;y+=step)for(let x=0;x<W;x+=step){ let best=0,bd=Infinity;
      for(let i=0;i<n;i++){ const dx=x-seeds[i].x,dy=y-seeds[i].y,d=dx*dx+dy*dy-seeds[i].weight; if(d<bd){bd=d;best=i;} }
      ax[best]+=x; ay[best]+=y; cnt[best]++; }
    for(let i=0;i<n;i++) if(cnt[i]){ seeds[i].x=seeds[i].x*.35+(ax[i]/cnt[i])*.65; seeds[i].y=seeds[i].y*.35+(ay[i]/cnt[i])*.65; } }
  return seeds;
}
function warpAt(x,y){ return { wx:x+(fbm(x*.016,y*.016,mapSeed+11,3)-.5)*WARP, wy:y+(fbm(x*.016,y*.016,mapSeed+71,3)-.5)*WARP }; }
function fieldAt(x,y){
  const {wx,wy}=warpAt(x,y);
  let b0=0,b1=0,d0=Infinity,d1=Infinity;
  for(let i=0;i<SEEDS.length;i++){ const dx=wx-SEEDS[i].x,dy=wy-SEEDS[i].y,d=dx*dx+dy*dy-SEEDS[i].weight;
    if(d<d0){d1=d0;b1=b0;d0=d;b0=i;} else if(d<d1){d1=d;b1=i;} }
  const sd=SEEDS[b0],s1=SEEDS[b1];
  const dist0=Math.hypot(wx-sd.x,wy-sd.y), dist1=Math.hypot(wx-s1.x,wy-s1.y), edgeDist=(dist1-dist0)*0.5;
  // 河宽随地点起伏 → 宽窄相间、有湾有潭的河流形态（而非等宽的"砖缝"）
  const ww = Math.max(5, WATER_W + (fbm(x*0.012, y*0.012, mapSeed+333, 3) - 0.5) * 20);
  if(edgeDist<ww){ const depth=(ww-edgeDist)/ww; return { h:-0.03-depth*0.085, water:true, seed:sd, t:1 }; }
  const rim=sm(Math.min(1,(edgeDist-ww)/RAMP));
  const reach=Math.sqrt(sd.weight)*0.72+26, t=Math.min(1,dist0/reach);
  let h=0.52+0.40*rim;
  if(sd.task.done) h-=Math.exp(-t*t*2.0)*0.11*rim; else h+=(1-t)*(1-t)*0.05*rim;
  h+=(fbm(x*0.05,y*0.05,mapSeed+200,4)-0.5)*0.05*rim;
  return { h, water:false, seed:sd, t };
}
// 梯田量化：在坡面切出可被光照投影的层叠台阶（参考图3的质感来源）
const TBANDS = 40;
function terr(h){ const q=Math.round(h*TBANDS)/TBANDS; return q*0.74 + h*0.26; }

/* ============================ three.js 场景 ============================ */
const WORLD_W = 120, WORLD_D = 80, AMP = 11, WATER_Y = 0.42;
// 冷灰配色（对位参考图3的中性石膏 / 银灰）
const COL_DONE  = new THREE.Color('#8d9295').convertSRGBToLinear();
const COL_LIGHT = new THREE.Color('#dadcdd').convertSRGBToLinear();
const COL_BANK  = new THREE.Color('#bcc0c1').convertSRGBToLinear();
const COL_WETFL = new THREE.Color('#8d989e').convertSRGBToLinear();

const canvas = document.getElementById('gl');
const overlay = document.getElementById('overlay');

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio||1));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.06;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(32, 3/2, 0.1, 2000);
camera.position.set(-6, 140, 58);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.target.set(0, 1, 0);
controls.minPolarAngle = 0.12; controls.maxPolarAngle = Math.PI*0.40;
controls.minDistance = 80; controls.maxDistance = 240;

/* 灯光：左上方主光（冷调影棚光）+ 半球补光 */
const key = new THREE.DirectionalLight(0xf3f6fa, 1.4);
key.position.set(-65, 130, 55);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.bias = -0.0004;
key.shadow.radius = 4;
const sc = key.shadow.camera;
sc.left=-90; sc.right=90; sc.top=70; sc.bottom=-70; sc.near=10; sc.far=340;
scene.add(key);
scene.add(new THREE.HemisphereLight(0xeef3f8, 0xb8bcbe, 1.2));
const fill = new THREE.DirectionalLight(0xe2eaf2, 0.4); fill.position.set(75, 45, -55); scene.add(fill);

/* 水面（独立反光平面，只在河道里露出）— 冷银灰 */
const water = new THREE.Mesh(
  new THREE.PlaneGeometry(WORLD_W*1.1, WORLD_D*1.1),
  new THREE.MeshStandardMaterial({ color:new THREE.Color('#aab4ba').convertSRGBToLinear(), roughness:0.1, metalness:0.0, transparent:true, opacity:0.92 })
);
water.rotation.x = -Math.PI/2; water.position.y = WATER_Y; water.receiveShadow = true;
scene.add(water);

/* 软阴影承接底盘 */
const base = new THREE.Mesh(
  new THREE.BoxGeometry(WORLD_W*1.02, 6, WORLD_D*1.02),
  new THREE.MeshStandardMaterial({ color:new THREE.Color('#cfc8bb').convertSRGBToLinear(), roughness:0.95 })
);
base.position.y = -4.0; base.receiveShadow = true; base.castShadow = true;
scene.add(base);

let terrain = null;
let labelEls = [];

function buildTerrain() {
  SEEDS = buildSeeds(FW, FH);
  const gw = 380, gh = 254;             // 网格分辨率
  const positions = new Float32Array(gw*gh*3);
  const colors = new Float32Array(gw*gh*3);
  for (let j=0;j<gh;j++) for (let i=0;i<gw;i++){
    const u=i/(gw-1), v=j/(gh-1);
    const f = fieldAt(u*FW, v*FH);
    const X = (u-0.5)*WORLD_W;
    const Z = (v-0.5)*WORLD_D;
    let Y;
    let col;
    if (f.water) { Y = terr(f.h)*AMP; col = COL_WETFL; }
    else {
      Y = terr(f.h)*AMP;
      // 岸边过渡到台地色
      const isBank = f.h < 0.5;
      col = f.seed.task.done ? COL_DONE : COL_LIGHT;
      if (isBank) col = col.clone().lerp(COL_BANK, 0.4);
    }
    const k = (j*gw+i);
    positions[k*3]=X; positions[k*3+1]=Y; positions[k*3+2]=Z;
    colors[k*3]=col.r; colors[k*3+1]=col.g; colors[k*3+2]=col.b;
  }
  const idx = [];
  for (let j=0;j<gh-1;j++) for (let i=0;i<gw-1;i++){
    const a=j*gw+i, b=a+1, c=a+gw, d=c+1;
    idx.push(a,c,b, b,c,d);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
  geo.setIndex(idx);
  geo.computeVertexNormals();

  if (terrain) { terrain.geometry.dispose(); scene.remove(terrain); }
  const mat = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.92, metalness:0.0, flatShading:false });
  terrain = new THREE.Mesh(geo, mat);
  terrain.castShadow = true; terrain.receiveShadow = true;
  scene.add(terrain);

  buildScatter();
  buildLabels();
}

/* 河岸带撒真实 3D instance：碎石（暗冷灰） + 灌木（亮白，模型上的小绿化） */
let scatterMeshes = [];
function buildScatter() {
  scatterMeshes.forEach(m => { m.geometry.dispose(); m.material.dispose(); scene.remove(m); });
  scatterMeshes = [];

  let s = (mapSeed ^ 0x9e3779b9) >>> 0;
  const rnd = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; };

  const rockGeo = new THREE.DodecahedronGeometry(0.5, 0);
  const bushGeo = new THREE.IcosahedronGeometry(0.55, 0);
  const rockMat = new THREE.MeshStandardMaterial({ color:new THREE.Color('#969b9e').convertSRGBToLinear(), roughness:0.88, flatShading:true });
  const bushMat = new THREE.MeshStandardMaterial({ color:new THREE.Color('#cfd4d4').convertSRGBToLinear(), roughness:0.75, flatShading:true });

  const MAX = 200;
  const rocks  = new THREE.InstancedMesh(rockGeo, rockMat, MAX);
  const bushes = new THREE.InstancedMesh(bushGeo, bushMat, MAX);
  rocks.castShadow = bushes.castShadow = true;
  rocks.receiveShadow = bushes.receiveShadow = true;

  const dummy = new THREE.Object3D();
  let ri = 0, bi = 0, tries = 0;
  while ((ri < MAX || bi < MAX) && tries < MAX * 60) {
    tries++;
    const fx = rnd() * FW, fy = rnd() * FH;
    const f = fieldAt(fx, fy);
    if (f.water || f.h < 0.48 || f.h > 0.70) continue;   // 只长在河岸 / 坡脚窄带
    // 噪声成团：只在簇心附近生长，形成稀疏的小灌木丛，而非满铺
    if (fbm(fx*0.022, fy*0.022, mapSeed+888, 2) < 0.52) continue;
    const X = (fx/FW - 0.5) * WORLD_W, Z = (fy/FH - 0.5) * WORLD_D, Y = terr(f.h) * AMP;
    if (rnd() < 0.45 && bi < MAX) {
      const sc = 0.4 + rnd() * 0.6;
      dummy.position.set(X, Y + sc * 0.24, Z);
      dummy.rotation.set(rnd()*0.4, rnd()*6.28, rnd()*0.4);
      dummy.scale.set(sc, sc * (0.5 + rnd()*0.45), sc);
      dummy.updateMatrix(); bushes.setMatrixAt(bi++, dummy.matrix);
    } else if (ri < MAX) {
      const sc = 0.28 + rnd() * 0.5;
      dummy.position.set(X, Y + sc * 0.16, Z);
      dummy.rotation.set(rnd()*6.28, rnd()*6.28, rnd()*6.28);
      dummy.scale.setScalar(sc);
      dummy.updateMatrix(); rocks.setMatrixAt(ri++, dummy.matrix);
    }
  }
  rocks.count = ri; bushes.count = bi;
  rocks.instanceMatrix.needsUpdate = true; bushes.instanceMatrix.needsUpdate = true;
  scene.add(rocks); scene.add(bushes);
  scatterMeshes.push(rocks, bushes);
}

/* 标签：取每座台地平顶质心，存世界坐标，每帧投影到屏幕 */
let LABELS = [];
function buildLabels() {
  const cnt=Array(SEEDS.length).fill(0), sx=Array(SEEDS.length).fill(0), sy=Array(SEEDS.length).fill(0), sh=Array(SEEDS.length).fill(0);
  const step=6;
  for(let y=0;y<FH;y+=step)for(let x=0;x<FW;x+=step){
    const f=fieldAt(x,y); if(f.water||f.h<0.55) continue;
    const i=SEEDS.indexOf(f.seed); sx[i]+=x; sy[i]+=y; sh[i]+=terr(f.h); cnt[i]++;
  }
  overlay.innerHTML='';
  LABELS = [];
  SEEDS.forEach((sd,i)=>{
    if(!cnt[i]) return;
    const u=(sx[i]/cnt[i])/FW, v=(sy[i]/cnt[i])/FH;
    const pos = new THREE.Vector3((u-0.5)*WORLD_W, (sh[i]/cnt[i])*AMP + 3.0, (v-0.5)*WORLD_D);
    const el=document.createElement('div');
    el.className='label '+(sd.task.done?'dark':'light');
    el.innerHTML=`<svg class="ic" viewBox="0 0 22 22" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">${ICONS[sd.task.icon]||''}</svg>`+
                 `<span class="nm">${sd.task.name}</span><span class="tm">${sd.task.time}</span>`;
    overlay.appendChild(el);
    LABELS.push({ el, pos });
  });
}

/* 后期：轻微移轴景深，强化"实拍模型"质感 */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bokeh = new BokehPass(scene, camera, { focus: 120.0, aperture: 0.00018, maxblur: 0.006 });
composer.addPass(bokeh);

function resize() {
  const rect = canvas.getBoundingClientRect();
  const w = Math.max(1, rect.width), h = Math.max(1, rect.height);
  renderer.setSize(w, h, false);
  composer.setSize(w, h);
  camera.aspect = w/h; camera.updateProjectionMatrix();
}

function projectLabels() {
  const rect = canvas.getBoundingClientRect();
  for (const L of LABELS) {
    const p = L.pos.clone().project(camera);
    const x = (p.x*0.5+0.5)*rect.width;
    const y = (-p.y*0.5+0.5)*rect.height;
    const vis = p.z < 1;
    L.el.style.display = vis ? 'block' : 'none';
    L.el.style.left = x+'px'; L.el.style.top = y+'px';
  }
}

let ready=false;
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  composer.render();
  projectLabels();
}

window.__regen = function(){
  mapSeed = Math.floor(Math.random()*1e6);
  tasks = tasks.slice().sort(()=>Math.random()-0.5);
  buildTerrain();
};

function start(){
  resize();
  buildTerrain();
  document.getElementById('loading').style.display='none';
  ready=true;
  animate();
}
window.addEventListener('resize', () => { clearTimeout(window.__rt); window.__rt=setTimeout(resize,150); });

try { start(); }
catch(e){ document.getElementById('loading').textContent='三维加载失败：'+e.message; console.error(e); }
</script>
</body>
