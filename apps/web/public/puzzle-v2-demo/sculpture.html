<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 B · 纹理雕刻写实地形（Hillshade）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --paper: #efece5;
    --ink: #2b2a27;
    --muted: #9c978c;
    --hair: #d9d4ca;
  }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #e7e3da;
    color: var(--ink);
    min-height: 100vh;
    padding: 26px;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: 'Songti SC', 'Noto Serif SC', 'Source Han Serif SC', Georgia, serif; }

  .plate {
    max-width: 1200px; margin: 0 auto;
    background:
      radial-gradient(120% 120% at 50% 0%, #f6f4ee 0%, var(--paper) 60%, #e8e4db 100%);
    border-radius: 14px;
    padding: 26px 30px 22px;
    box-shadow: 0 36px 90px rgba(40,38,33,.16), inset 0 0 0 1px rgba(255,255,255,.5);
  }

  /* top chrome */
  .top { display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; margin-bottom: 18px; }
  .top .l .kicker { font-size: 10px; letter-spacing: .34em; color: var(--muted); }
  .top .l .h { font-size: 19px; letter-spacing: .06em; margin-top: 5px; }
  .top .l .h small { color: var(--muted); font-size: 13px; letter-spacing: .1em; }
  .top .c { text-align: center; }
  .top .c .bc { font-size: 10px; color: var(--muted); letter-spacing: .12em; }
  .top .c .h { font-size: 24px; letter-spacing: .14em; margin-top: 3px; }
  .top .c .en { font-size: 9px; color: var(--muted); letter-spacing: .42em; margin-top: 4px; }
  .top .r { text-align: right; font-size: 12px; color: #6f6a60; }
  .top .r .date { letter-spacing: .08em; }
  .top .r .wx { margin-top: 6px; letter-spacing: .16em; color: var(--muted); font-size: 11px; }

  .body { display: grid; grid-template-columns: 64px 1fr; gap: 8px; }
  .rail { display: flex; flex-direction: column; justify-content: space-between; padding: 6px 0; }
  .rail .legend .li { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #6f6a60; margin-bottom: 10px; }
  .rail .legend .li::before {
    content: ''; width: 12px; height: 12px; border-radius: 50%; flex: none;
    box-shadow: inset 0 1px 2px rgba(0,0,0,.35);
  }
  .rail .legend .done::before { background: #6d6a64; }
  .rail .legend .todo::before { background: #ded9cf; }
  .rail .legend .li span { writing-mode: vertical-rl; letter-spacing: .12em; }
  .compass { width: 42px; height: 42px; opacity: .5; }

  .stage { position: relative; }
  .map-frame {
    position: relative; width: 100%; aspect-ratio: 3 / 2;
    border-radius: 8px; overflow: hidden;
    background: #efece5;
    box-shadow: inset 0 0 0 1px rgba(40,38,33,.08), inset 0 2px 18px rgba(40,38,33,.08);
  }
  #relief { width: 100%; height: 100%; display: block; }

  .labels { position: absolute; inset: 0; pointer-events: none; }
  .label { position: absolute; transform: translate(-50%, -50%); text-align: center; white-space: nowrap; }
  .label .ic { display: block; margin: 0 auto 7px; width: 22px; height: 22px; opacity: .9; }
  .label .nm { display: block; font-size: 14px; letter-spacing: .02em; }
  .label .tm { display: block; font-size: 10px; letter-spacing: .12em; margin-top: 4px; opacity: .8; font-variant-numeric: tabular-nums; }
  .label.dark { color: #f0ede6; text-shadow: 0 1px 2px rgba(0,0,0,.45); }
  .label.dark .ic path, .label.dark .ic circle, .label.dark .ic line, .label.dark .ic polyline { stroke: #f0ede6; }
  .label.light { color: #45423b; text-shadow: 0 1px 0 rgba(255,255,255,.6); }
  .label.light .ic path, .label.light .ic circle, .label.light .ic line, .label.light .ic polyline { stroke: #5a564d; }

  .bottom { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-top: 14px; color: var(--muted); }
  .bottom .mid { text-align: center; font-size: 11px; letter-spacing: .3em; }
  .bottom .rt { text-align: right; font-size: 10px; letter-spacing: .34em; }
  .bottom .lf { font-size: 10px; letter-spacing: .2em; }
  .btn {
    border: 1px solid var(--hair); background: rgba(255,255,255,.5); color: #5a564d;
    font: inherit; font-size: 11px; letter-spacing: .1em; padding: 7px 14px; border-radius: 20px; cursor: pointer;
  }
  .btn:hover { background: #fff; }
</style>
</head>
<body>
  <div class="plate">
    <div class="top">
      <div class="l">
        <div class="kicker">YEAR REVIEW</div>
        <div class="h serif">年终复盘 <small>— 2024</small></div>
      </div>
      <div class="c">
        <div class="bc">年终复盘 › 当日详情</div>
        <div class="h serif">当日详情</div>
        <div class="en">DAY DETAIL</div>
      </div>
      <div class="r">
        <div class="date" id="dateText">2024 / 12 / 31　周二</div>
        <div class="wx">☀ 晴　6℃　微风</div>
      </div>
    </div>

    <div class="body">
      <div class="rail">
        <div class="legend">
          <div class="li done"><span>已完成</span></div>
          <div class="li todo"><span>未完成</span></div>
        </div>
        <svg class="compass" viewBox="0 0 40 40" fill="none" stroke="#8c877c" stroke-width="1">
          <circle cx="20" cy="22" r="11"/>
          <path d="M20 13 L23 22 L20 31 L17 22 Z" fill="#8c877c" stroke="none"/>
          <text x="20" y="9" font-size="7" fill="#8c877c" text-anchor="middle" font-family="serif">N</text>
        </svg>
      </div>

      <div class="stage">
        <div class="map-frame">
          <canvas id="relief"></canvas>
          <div class="labels" id="labels"></div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <div class="lf"><button class="btn" onclick="regenerate()">重新生成</button></div>
      <div class="mid serif">专 注 · 系 统 · 成 长</div>
      <div class="rt">DAY MAP —</div>
    </div>
  </div>

<script>
/* =============================================================================
   方案 B — 纹理雕刻写实地形（2D Hillshade 伪三维）
   复用同一套「高度场 + power diagram」引擎，但渲染换成法线光照：
     1. 高度场把每个任务做成「平顶台地（mesa）」，台地之间是下凹的河道（自由时间）
        · 已完成 → 台地中心下沉成深色水潭（参考图3里的深色块）
        · 未完成 → 台地中心微隆，整体浅色
     2. 由高度场算表面法线 · 与定向光点乘 → 灰度浮雕（hillshade）
     3. 坡面叠加「梯田 / 等高线」纹理，模拟层叠模型质感
     4. 河道加镜面高光 + 台地边缘撒细碎「灌木 / 碎石」
   ========================================================================== */

let tasks = [
  { id: 'plan',  name: '晨间计划', time: '06:30 – 08:00', duration: 90,  done: true,  icon: 'sun'   },
  { id: 'deep',  name: '深度工作', time: '09:00 – 11:30', duration: 150, done: true,  icon: 'peak'  },
  { id: 'code',  name: '编码',     time: '12:30 – 14:00', duration: 90,  done: true,  icon: 'code'  },
  { id: 'meet',  name: '会议',     time: '14:00 – 15:30', duration: 90,  done: false, icon: 'people'},
  { id: 'sport', name: '运动',     time: '17:30 – 18:30', duration: 60,  done: false, icon: 'run'   },
  { id: 'read',  name: '阅读',     time: '19:30 – 20:30', duration: 60,  done: false, icon: 'book'  },
  { id: 'rev',   name: '复盘',     time: '21:00 – 22:00', duration: 60,  done: false, icon: 'cycle' },
  { id: 'rest',  name: '休闲',     time: '22:00 – 23:00', duration: 60,  done: false, icon: 'cup'   },
];

const ICONS = {
  sun:   '<circle cx="11" cy="11" r="4.5"/><line x1="11" y1="1" x2="11" y2="4"/><line x1="11" y1="18" x2="11" y2="21"/><line x1="1" y1="11" x2="4" y2="11"/><line x1="18" y1="11" x2="21" y2="11"/><line x1="4" y1="4" x2="6" y2="6"/><line x1="16" y1="16" x2="18" y2="18"/><line x1="4" y1="18" x2="6" y2="16"/><line x1="16" y1="6" x2="18" y2="4"/>',
  peak:  '<path d="M2 19 L8 7 L12 13 L15 8 L20 19 Z"/>',
  code:  '<polyline points="7,7 2,11 7,15"/><polyline points="15,7 20,11 15,15"/><line x1="12" y1="5" x2="10" y2="17"/>',
  people:'<circle cx="8" cy="8" r="3"/><circle cx="15" cy="9" r="2.5"/><path d="M3 19 C3 14 13 14 13 19"/><path d="M12 19 C12 15 19 15 19 19"/>',
  run:   '<circle cx="13" cy="4" r="2"/><path d="M13 7 L10 12 L14 14 L13 20"/><path d="M10 12 L5 13"/><path d="M14 14 L18 12"/>',
  book:  '<path d="M11 5 C8 3 3 3 3 3 L3 17 C3 17 8 17 11 19 C14 17 19 17 19 17 L19 3 C19 3 14 3 11 5 Z"/><line x1="11" y1="5" x2="11" y2="19"/>',
  cycle: '<path d="M5 11 A6 6 0 1 1 7 16"/><polyline points="3,7 5,11 9,9"/>',
  cup:   '<path d="M4 7 L16 7 L15 16 C15 18 5 18 5 16 Z"/><path d="M16 9 C20 9 20 14 16 14"/>',
};

let mapSeed = 20241231;
const WARP = 30;       // 海岸/河岸蜿蜒度
const WATER_W = 14;    // 河道半宽
const RAMP = 30;       // 台地从河岸爬升到平顶的坡宽（越大越缓、梯田越多）

/* ---------- value noise / fBm ---------- */
function hash(x, y, s) {
  let h = s + x * 374761393 + y * 668265263;
  h = (h ^ (h >> 13)) * 1274126177; h = h ^ (h >> 16);
  return (h & 0x7fffffff) / 0x7fffffff;
}
const sm = t => t * t * (3 - 2 * t);
function noise(x, y, s) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = sm(x - ix), fy = sm(y - iy);
  const a = hash(ix, iy, s), b = hash(ix + 1, iy, s), c = hash(ix, iy + 1, s), d = hash(ix + 1, iy + 1, s);
  return a + (b - a) * fx + (c - a) * fy + (a - b - c + d) * fx * fy;
}
function fbm(x, y, s, oct = 4) {
  let v = 0, amp = 1, f = 1, m = 0;
  for (let i = 0; i < oct; i++) { v += amp * noise(x * f, y * f, s + i * 57); m += amp; amp *= 0.5; f *= 2; }
  return v / m;
}
function rand(s) { return hash(s & 65535, (s >> 16) & 65535, mapSeed); }

/* ---------- 任务 → 种子（power diagram） ---------- */
let SEEDS = [];
function buildSeeds(W, H) {
  const total = tasks.reduce((a, t) => a + t.duration, 0);
  const cx = W / 2, cy = H / 2;
  const golden = Math.PI * (3 - Math.sqrt(5));
  const n = tasks.length;
  let seeds = tasks.map((task, i) => {
    const ratio = task.duration / total;
    const ang = i * golden + (rand(i * 13 + 1) - 0.5) * 0.6;
    const rad = Math.sqrt((i + 0.5) / n) * Math.min(W, H) * 0.46;
    return {
      task,
      x: cx + Math.cos(ang) * rad * (W / Math.min(W, H)),
      y: cy + Math.sin(ang) * rad,
      weight: (0.5 + ratio) * W * H * 0.12,
    };
  });
  for (let pass = 0; pass < 6; pass++) {
    const ax = new Array(n).fill(0), ay = new Array(n).fill(0), cnt = new Array(n).fill(0);
    const step = 6;
    for (let y = 0; y < H; y += step) for (let x = 0; x < W; x += step) {
      let best = 0, bd = Infinity;
      for (let i = 0; i < n; i++) {
        const dx = x - seeds[i].x, dy = y - seeds[i].y;
        const d = dx * dx + dy * dy - seeds[i].weight;
        if (d < bd) { bd = d; best = i; }
      }
      ax[best] += x; ay[best] += y; cnt[best]++;
    }
    for (let i = 0; i < n; i++) if (cnt[i]) {
      seeds[i].x = seeds[i].x * 0.35 + (ax[i] / cnt[i]) * 0.65;
      seeds[i].y = seeds[i].y * 0.35 + (ay[i] / cnt[i]) * 0.65;
    }
  }
  return seeds;
}

function warpAt(x, y) {
  return {
    wx: x + (fbm(x * 0.016, y * 0.016, mapSeed + 11, 3) - 0.5) * WARP,
    wy: y + (fbm(x * 0.016, y * 0.016, mapSeed + 71, 3) - 0.5) * WARP,
  };
}

/* ---------- 高度场（平顶台地 + 河道）+ 元信息 ---------- */
function fieldAt(x, y) {
  const { wx, wy } = warpAt(x, y);
  let b0 = 0, b1 = 0, d0 = Infinity, d1 = Infinity;
  for (let i = 0; i < SEEDS.length; i++) {
    const dx = wx - SEEDS[i].x, dy = wy - SEEDS[i].y;
    const d = dx * dx + dy * dy - SEEDS[i].weight;
    if (d < d0) { d1 = d0; b1 = b0; d0 = d; b0 = i; }
    else if (d < d1) { d1 = d; b1 = i; }
  }
  const sd = SEEDS[b0], s1 = SEEDS[b1];
  const dist0 = Math.hypot(wx - sd.x, wy - sd.y);
  const dist1 = Math.hypot(wx - s1.x, wy - s1.y);
  const edgeDist = (dist1 - dist0) * 0.5;

  if (edgeDist < WATER_W) {
    const depth = (WATER_W - edgeDist) / WATER_W;          // 0(岸)→1(河心)
    return { h: -0.04 - depth * 0.06, water: true, seed: sd, t: 1 };
  }
  const rim = sm(Math.min(1, (edgeDist - WATER_W) / RAMP)); // 0(岸)→1(平顶)
  const reach = Math.sqrt(sd.weight) * 0.72 + 26;
  const t = Math.min(1, dist0 / reach);
  let h = 0.45 + 0.45 * rim;                                // 平台基准高度
  if (sd.task.done) h -= Math.exp(-t * t * 2.0) * 0.34 * rim;   // 中心下沉成潭
  else              h += (1 - t) * (1 - t) * 0.06 * rim;        // 中心微隆
  h += (fbm(x * 0.05, y * 0.05, mapSeed + 200, 4) - 0.5) * 0.05 * rim; // 表面颗粒
  return { h, water: false, seed: sd, t };
}

/* ---------- 渲染 ---------- */
let R = { ctx: null, W: 0, H: 0, cssScale: 1 };
const clamp01 = v => v < 0 ? 0 : v > 1 ? 1 : v;

function setupCanvas() {
  const canvas = document.getElementById('relief');
  const rect = canvas.getBoundingClientRect();
  const W = Math.max(1, Math.floor(rect.width));
  const H = Math.max(1, Math.floor(rect.height));
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  R = { ctx, W, H, cssScale: rect.width / W };
  SEEDS = buildSeeds(W, H);
}

// 光照参数
const RELIEF = 7.0;                 // 法线对梯度的放大（浮雕强度）
const TERRACE_BANDS = 26;           // 梯田层数（坡面层叠纹理密度）
const L = (() => { const v = [-0.5, -0.55, 0.66]; const m = Math.hypot(...v); return v.map(c => c / m); })();

function render() {
  setupCanvas();
  shadeRelief();
  scatterFoliage();
  placeLabels();
}

function shadeRelief() {
  const { ctx, W, H } = R;
  const scale = 2;
  const sw = Math.ceil(W / scale), sh = Math.ceil(H / scale);

  // pass1: 采样高度场 + 元信息
  const hh = new Float32Array(sw * sh);
  const water = new Uint8Array(sw * sh);
  const done = new Uint8Array(sw * sh);
  for (let j = 0; j < sh; j++) for (let i = 0; i < sw; i++) {
    const f = fieldAt(i * scale, j * scale);
    const k = j * sw + i;
    hh[k] = f.h; water[k] = f.water ? 1 : 0; done[k] = (!f.water && f.seed.task.done) ? 1 : 0;
  }

  // pass2: hillshade
  const img = ctx.createImageData(sw, sh);
  const d = img.data;
  const at = (i, j) => hh[Math.max(0, Math.min(sh - 1, j)) * sw + Math.max(0, Math.min(sw - 1, i))];
  for (let j = 0; j < sh; j++) for (let i = 0; i < sw; i++) {
    const k = j * sw + i;
    const gx = (at(i + 1, j) - at(i - 1, j)) * RELIEF;
    const gy = (at(i, j + 1) - at(i, j - 1)) * RELIEF;
    let nx = -gx, ny = -gy, nz = 1;
    const inv = 1 / Math.hypot(nx, ny, nz); nx *= inv; ny *= inv; nz *= inv;

    const diff = clamp01(nx * L[0] + ny * L[1] + nz * L[2]);
    const h = hh[k];

    // 反照率（材质底色）
    let ar, ag, ab;
    if (water[k]) { ar = 196; ag = 204; ab = 210; }      // 水：银蓝
    else if (done[k]) { ar = 96; ag = 95; ab = 92; }      // 已完成：深石灰
    else { ar = 216; ag = 213; ab = 206; }                // 未完成：暖白石膏

    // 环境光 + 漫反射
    let shade = 0.42 + 0.78 * diff;
    // 高度向环境光遮蔽（谷底偏暗）
    const ao = 0.72 + 0.28 * sm(clamp01((h + 0.12) / 0.7));
    shade *= ao;

    // 梯田纹理：坡面按高度量化，层与层之间压一道暗线
    if (!water[k]) {
      const band = h * TERRACE_BANDS;
      const edge = Math.abs(band - Math.round(band));   // 0 在层界
      const slope = Math.hypot(gx, gy);                 // 坡越陡，纹理越明显
      const terr = (1 - sm(clamp01(edge / 0.16))) * clamp01(slope * 0.5) * 0.5;
      shade *= (1 - terr);
    }

    // 镜面高光：水面更亮、更聚
    const hb = [L[0], L[1], L[2] + 1]; const hm = Math.hypot(...hb);
    const spec = Math.pow(clamp01((nx * hb[0] + ny * hb[1] + nz * hb[2]) / hm), water[k] ? 60 : 22);
    const specAmt = water[k] ? 0.85 : 0.10;

    let r = ar * shade + 255 * spec * specAmt;
    let g = ag * shade + 255 * spec * specAmt;
    let b = ab * shade + 255 * spec * specAmt;

    // 细颗粒
    const grain = (hash(i, j, mapSeed) - 0.5) * 10;
    r += grain; g += grain; b += grain;

    const o = k * 4;
    d[o] = clamp01(r / 255) * 255; d[o + 1] = clamp01(g / 255) * 255; d[o + 2] = clamp01(b / 255) * 255; d[o + 3] = 255;
  }

  const tmp = document.createElement('canvas');
  tmp.width = sw; tmp.height = sh; tmp.getContext('2d').putImageData(img, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(tmp, 0, 0, W, H);
}

/* ---------- 台地边缘撒「灌木 / 碎石」 ---------- */
function scatterFoliage() {
  const { ctx, W, H } = R;
  let s = mapSeed;
  const rnd = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; };
  const N = Math.floor(W * H / 2600);
  for (let i = 0; i < N; i++) {
    const x = rnd() * W, y = rnd() * H;
    const f = fieldAt(x, y);
    if (f.water) continue;
    // 只在台地的中下坡（靠近河岸的环带）撒，模拟边缘植被
    if (f.h < 0.2 || f.h > 0.62) continue;
    if (rnd() > 0.5) continue;
    const r = 1 + rnd() * 1.8;
    // 受光面亮 + 背光投影，制造微立体
    ctx.fillStyle = 'rgba(60,58,53,.30)';
    ctx.beginPath(); ctx.arc(x + 0.6, y + 0.8, r, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(244,242,236,.85)';
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
  }
}

/* ---------- 标签（台地质心，受光分明暗） ---------- */
function placeLabels() {
  const { W, H, cssScale } = R;
  const box = document.getElementById('labels');
  box.innerHTML = '';
  const cnt = new Array(SEEDS.length).fill(0);
  const sx = new Array(SEEDS.length).fill(0), sy = new Array(SEEDS.length).fill(0);
  const step = 8;
  for (let y = 0; y < H; y += step) for (let x = 0; x < W; x += step) {
    const f = fieldAt(x, y);
    if (f.water || f.h < 0.45) continue;     // 只在平顶取质心 → 标签居中
    const i = SEEDS.indexOf(f.seed);
    sx[i] += x; sy[i] += y; cnt[i]++;
  }
  SEEDS.forEach((sd, i) => {
    if (!cnt[i]) return;
    const cx = sx[i] / cnt[i], cy = sy[i] / cnt[i];
    const el = document.createElement('div');
    el.className = 'label ' + (sd.task.done ? 'dark' : 'light');
    el.style.left = (cx * cssScale) + 'px';
    el.style.top = (cy * cssScale) + 'px';
    const ic = ICONS[sd.task.icon] || '';
    el.innerHTML =
      `<svg class="ic" viewBox="0 0 22 22" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">${ic}</svg>` +
      `<span class="nm">${sd.task.name}</span><span class="tm">${sd.task.time}</span>`;
    box.appendChild(el);
  });
}

function regenerate() {
  mapSeed = Math.floor(Math.random() * 1e6);
  tasks = tasks.slice().sort(() => Math.random() - 0.5);
  render();
}

const params = new URLSearchParams(location.search);
if (params.get('seed')) mapSeed = +params.get('seed');
window.addEventListener('load', render);
let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(render, 160); });
</script>
</body>
</html>
